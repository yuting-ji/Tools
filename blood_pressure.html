<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姿態性低血壓檢測記錄</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #008000; /* 國泰綠色系 */
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #f8f9fa;
            color: #2c3e50;
        }
        input[type="text"], input[type="number"], input[type="date"] {
            width: 90%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .patient-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .patient-info div {
            width: 48%;
        }
        .btn-group {
            margin-top: 30px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            margin: 0 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .btn-clear { background-color: #e74c3c; color: white; }
        .btn-clear:hover { background-color: #c0392b; }
        .btn-print { background-color: #3498db; color: white; }
        .btn-print:hover { background-color: #2980b9; }
        .btn-word { background-color: #2ecc71; color: white; }
        .btn-word:hover { background-color: #27ae60; }

        /* 列印時隱藏按鈕與優化版面，確保印出來或轉PDF時畫面乾淨 */
        @media print {
            .btn-group { display: none; }
            body { background-color: #fff; }
            .container { box-shadow: none; padding: 0; }
            input[type="text"], input[type="number"], input[type="date"] {
                border: none;
                background: transparent;
            }
        }
    </style>
</head>
<body>

<div class="container" id="export-area">
    <h2>姿態性低血壓檢測記錄表</h2>
    
    <div class="patient-info">
        <div>
            <label for="patientName">姓名：</label>
            <input type="text" id="patientName" placeholder="請輸入姓名">
        </div>
        <div>
            <label for="recordDate">檢測日期：</label>
            <input type="date" id="recordDate">
        </div>
    </div>

    <table id="recordTable">
        <thead>
            <tr>
                <th>測量姿勢與時間</th>
                <th>收縮壓 (mmHg)</th>
                <th>舒張壓 (mmHg)</th>
                <th>心跳 (次/分)</th>
                <th>備註</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>平臥 (臥姿)</td>
                <td><input type="number" class="data-input" placeholder="數值"></td>
                <td><input type="number" class="data-input" placeholder="數值"></td>
                <td><input type="number" class="data-input" placeholder="數值"></td>
                <td><input type="text" class="data-input" placeholder="無"></td>
            </tr>
            <tr>
                <td>坐起 2 分鐘後</td>
                <td><input type="number" class="data-input" placeholder="數值"></td>
                <td><input type="number" class="data-input" placeholder="數值"></td>
                <td><input type="number" class="data-input" placeholder="數值"></td>
                <td><input type="text" class="data-input" placeholder="無"></td>
            </tr>
            <tr>
                <td>站立 2 分鐘後</td>
                <td><input type="number" class="data-input" placeholder="數值"></td>
                <td><input type="number" class="data-input" placeholder="數值"></td>
                <td><input type="number" class="data-input" placeholder="數值"></td>
                <td><input type="text" class="data-input" placeholder="無"></td>
            </tr>
        </tbody>
    </table>

    <div class="btn-group">
        <button class="btn-clear" onclick="clearData()">一鍵清除資料</button>
        <button class="btn-print" onclick="window.print()">預覽 / 列印 PDF</button>
        <button class="btn-word" onclick="exportToWord()">匯出 Word 檔</button>
    </div>
</div>

<script>
    // 一鍵清除功能：抓取畫面上所有的 input 標籤，並將裡面的值清空
    function clearData() {
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.value = '';
        });
    }

    // 匯出 Word 檔功能：利用純前端技術將 HTML 表格轉換為 Word 可讀取的格式
    function exportToWord() {
        const exportArea = document.getElementById('export-area');
        // 複製一份 DOM 節點，避免修改到使用者目前正在看的畫面
        const clone = exportArea.cloneNode(true);
        
        // 移除複製節點中的按鈕區塊，因為 Word 檔裡不需要按鈕
        const btnGroup = clone.querySelector('.btn-group');
        if (btnGroup) {
            btnGroup.remove();
        }

        // 將 input 輸入框轉換成純文字，讓 Word 能夠正確顯示填寫的數字，而不是空白的輸入框
        const originalInputs = exportArea.querySelectorAll('input');
        const clonedInputs = clone.querySelectorAll('input');
        
        for (let i = 0; i < originalInputs.length; i++) {
            const val = originalInputs[i].value;
            // 如果有填值就顯示值，沒填就給個空白字元維持排版
            const textNode = document.createTextNode(val || ' ');
            clonedInputs[i].parentNode.replaceChild(textNode, clonedInputs[i]);
        }

        // 組合 Word 支援的 HTML 格式開頭與結尾
        const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>血壓記錄</title><style>table { border-collapse: collapse; width: 100%; } th, td { border: 1px solid black; padding: 8px; text-align: center; font-family: '微軟正黑體', sans-serif; }</style></head><body>";
        const footer = "</body></html>";
        const htmlString = header + clone.innerHTML + footer;

        // 建立 Blob 物件觸發下載 (MIME type 設定為 msword)
        const blob = new Blob(['\ufeff', htmlString], {
            type: 'application/msword'
        });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = '姿態性低血壓檢測記錄.doc';
        document.body.appendChild(link);
        link.click();
        
        // 清理記憶體，移除剛剛建立的隱藏下載連結
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
